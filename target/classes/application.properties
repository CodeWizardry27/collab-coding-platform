# Port
server.port=8080

# STOMP/WebSocket configuration
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Enable CORS for local testing from non-served files
spring.web.cors.allowed-origins=*

# --- Database Routing ---
# Render passes the Postgres database connection via the DATABASE_URL environment variable
# By default, use an in-memory H2 database if no environment variable is provided (Local Dev)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:collabcodedb}

# H2 Configuration (Safe fallback)
spring.datasource.driver-class-name=${JDBC_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:password}

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${JDBC_DIALECT:org.hibernate.dialect.H2Dialect}

# Enable H2 web console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
